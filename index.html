<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        .hp-fill { transition: width 0.5s ease; }
        .tab-content { display: none; }
        button:active { transform: scale(0.95); }
        /* ドラクエ風フォントのシミュレート */
        .dq-font { font-family: 'MS Gothic', 'Courier New', monospace; }
    </style>
</head>
<body class="min-h-screen pb-24 bg-slate-950">
<div id="login-screen" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-6 dq-font text-white">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-black tracking-widest text-yellow-400 mb-2 animate-pulse">ENGLISH QUEST</h1>
        <p class="text-xs text-slate-400">〜 とびたて 英語の だいちへ 〜</p>
    </div>

    <div class="w-full max-w-xs bg-black border-4 border-white p-6 shadow-2xl space-y-6">
        <div class="text-sm tracking-wide leading-relaxed">
            APIキーを にゅうりょく してください。
        </div>
        
        <input type="password" id="api-key-input" placeholder="AIzaSy..." 
               class="w-full bg-black border-2 border-white/50 text-white p-2 text-sm focus:outline-none focus:border-white tracking-widest">
        
        <button id="launch-btn" onclick="launchApp()" 
                class="w-full text-left hover:bg-white/10 p-2 flex items-center gap-2 border border-transparent hover:border-white transition-all">
            <span class="text-blue-400">▶</span>
            <span class="font-bold text-sm">ぼうけんを はじめる</span>
        </button>
    </div>
</div>
    <header class="p-4 bg-slate-900 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">ENGLISH RPG</h1>
                <div class="flex gap-4">
                    <div class="text-xs font-bold text-slate-400">LV: <span id="ulv" class="text-white">-</span></div>
                    <div class="text-xs font-bold text-slate-400">SCORE: <span id="uscore" class="text-white">-</span></div>
                </div>
            </div>
            <div class="w-32">
                <div class="flex justify-between text-[10px] mb-1 font-bold"><span>PLAYER HP</span></div>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden border border-white/5">
                    <div id="uhp-b" class="hp-fill h-full bg-gradient-to-r from-emerald-500 to-emerald-400" style="width: 100%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="flex bg-slate-900/80 p-1 rounded-xl border border-white/10">
            <button onclick="tab('battle')" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-slate-800 shadow-inner">BATTLE</button>
            <button onclick="tab('chat')" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-500">AI TUTOR</button>
            <button onclick="tab('talk')" class="flex-1 py-2 rounded-lg text-xs font-bold text-slate-500">AI TALK</button>
        </div>

        <div id="battle" class="tab-content space-y-4">
            <div id="b-card" class="bg-black/90 border-4 border-white p-4 shadow-lg shadow-white/10">
                <div id="m-image-container" class="w-full h-40 bg-black flex items-center justify-center p-2 border-2 border-white mb-4 overflow-hidden">
                    <img id="m-img" src="" alt="Monster" class="max-h-full max-w-full">
                </div>
                <div class="space-y-2 text-white">
                    <div class="flex justify-between items-center dq-font">
                        <span id="m-name" class="font-bold text-lg tracking-wide">さがしています...</span>
                        <span id="m-hp-text" class="text-xs text-white/70">HP</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 border border-white/50 overflow-hidden">
                        <div id="m-hp-bar" class="bg-blue-500 h-full w-full transition-all duration-500"></div>
                    </div>
                </div>
            </div>

            <div id="log" class="bg-black/80 border-4 border-white/70 p-4 h-28 overflow-y-auto text-sm dq-font text-white/90 space-y-1">
                <div id="q-cat" class="text-blue-400 text-xs">READY</div>
                <div id="q-txt">冒険の準備をしています...</div>
            </div>

            <div class="p-2 bg-slate-900 rounded-xl border border-white/10">
                <input type="text" id="ans" placeholder="答えを入力して ATTACK!" class="w-full bg-black border border-white/30 text-white p-3 rounded-lg focus:outline-none focus:border-blue-500 dq-font">
            </div>

            <div class="bg-black/90 border-4 border-white p-4 grid grid-cols-2 gap-3 shadow-lg shadow-white/10 dq-font">
                <button onclick="check()" class="text-left text-white group flex items-center gap-2 hover:bg-white/10 p-1">
                    <span class="text-blue-400">▶</span>
                    <div>
                        <div class="text-[10px] text-slate-500">たたかう</div>
                        <div class="font-bold italic">ATTACK</div>
                    </div>
                </button>
                <button onclick="tab('chat')" class="text-left text-white group flex items-center gap-2 hover:bg-white/10 p-1">
                    <span class="text-cyan-400">▶</span>
                    <div>
                        <div class="text-[10px] text-slate-500">じゅもん</div>
                        <div class="font-bold italic">HINT</div>
                    </div>
                </button>
            </div>
        </div>

        <div id="chat" class="hidden tab-content bg-black border-4 border-white p-4 dq-font overflow-hidden shadow-lg shadow-white/10">
            <div id="cbox" class="h-60 overflow-y-auto p-2 space-y-4 text-sm text-white/90">
                <div class="text-left"><span>Hello! Let's practice English.</span></div>
            </div>
            <div class="p-2 border-t border-white bg-slate-900/50 flex gap-2">
                <input type="text" id="chat-input" placeholder="質問を入力..." class="flex-1 bg-black border border-white px-4 py-2 text-sm text-white focus:outline-none">
                <button onclick="sendChat()" class="bg-white text-black px-4 py-2 text-sm font-bold border-2 border-black">SEND</button>
            </div>
        </div>

        <div id="talk" class="hidden tab-content bg-slate-900/50 rounded-2xl border border-white/10 p-8 text-center space-y-6">
            <div class="relative mx-auto w-32 h-32 flex items-center justify-center">
                <div id="talk-wave" class="absolute inset-0 bg-blue-500/20 rounded-full animate-ping"></div>
                <div class="relative bg-blue-600 w-20 h-20 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <i class="fa-solid fa-microphone text-3xl text-white"></i>
                </div>
            </div>
            <div class="space-y-2">
                <h3 id="talk-status" class="text-lg font-bold text-slate-200">READY TO TALK</h3>
                <p class="text-sm text-slate-400 italic">Gemini 2.5 Flash Native Audio</p>
            </div>
            <button id="talk-btn" onclick="startTalkSession()" class="px-8 py-3 bg-white text-slate-900 ...">
    START SESSION
</button>
        </div>
    </main>

    <div id="ovl" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-blue-400 font-bold animate-pulse">CONNECTING TO WORLD...</p>
    </div>

    <script>
        // GASのURL（ここにあなたのURLを入れる、空欄でも自分自身を呼ぶ設定ならOK）
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwfQLtjlbrxr6_Jc2u8vF6z6FBM5OQpEaccwngC2vYrJF2RY65rDP7p9XYHXoLiq_EyfA/exec"; 

// --- [Native Audio 統合設定] ---
let ws;
let audioCtx;
let processor;
let micStream;
let userApiKey = ""; // ユーザーが入力したキーを保持する変数

// PCM音声処理（インラインWorklet）
const processorCode = `
  class PCMProcessor extends AudioWorkletProcessor {
    process(inputs) {
      const input = inputs[0];
      if (input && input[0]) {
        const samples = input[0];
        const pcm16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
          let s = Math.max(-1, Math.min(1, samples[i]));
          pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        this.port.postMessage(pcm16.buffer, [pcm16.buffer]);
      }
      return true;
    }
  }
  registerProcessor('pcm-processor', PCMProcessor);
`;

function launchApp() {
    const keyInput = document.getElementById('api-key-input').value.trim();
    
    if (!keyInput) {
        alert("APIキーが にゅうりょく されていません！");
        return;
    }

    // ① 入力されたキーを保持する
    userApiKey = keyInput;

    // ② ログイン画面を非表示（hidden）にして消し去る
    document.getElementById('login-screen').classList.add('hidden');

    // ③ ここで初めて本来のゲームデータ（load）を読み込む
    load();
}

function sendInitialSetup() {
    if (ws && ws.readyState === WebSocket.OPEN) {
        const setupMessage = {
            setup: {
                // ここを 3.1 に変更
                model: "models/gemini-3.1-flash-live-preview", 
                generation_config: {
                    response_modalities: ["AUDIO"],
                    // 3.1では「思考レベル」を調整できるようになりました
                    thinking_level: "low" // 会話のテンポを優先
                }
            }
        };
        ws.send(JSON.stringify(setupMessage));
        console.log("Setup message sent for Gemini 3.1 Flash Live");
    }
}

// 【宛先だけを修正】セッション開始関数
async function startTalkSession() {
  const statusEl = document.getElementById('talk-status');
  if (statusEl) statusEl.innerText = "CONNECTING...";
  
  try {
    // 元のコード：const apiKey = "YOUR_API_KEY"; を以下のように変更
const apiKey = userApiKey;

    if (!apiKey || apiKey.includes("あなたのAPIキー")) {
      if (statusEl) statusEl.innerText = "API KEY NOT SET";
      return;
    }

    // Googleが現在リアルタイム通信を受け付けている正しいモデル名に指定
    const config = {
      modelId: "models/gemini-2.0-flash-exp", // ※最新の安定したLive対応モデル名に変更
      apiKey: apiKey
    };

    await connectToGemini(config);

  } catch (e) {
    console.error("Error:", e);
    if (statusEl) statusEl.innerText = "CONNECTION FAILED";
  }
}

// 【宛先だけを修正】WebSocket接続関数
async function connectToGemini(config) {
  // Google AI Studioの公式仕様に沿った正しいLive APIエンドポイント
  const baseUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.ModelService.BidirectionalGenerateContent?model=${config.modelId}`;
  const url = `${baseUrl}&key=${config.apiKey}`;
  
  console.log("Connecting with updated URL...");
  ws = new WebSocket(url);

  ws.onopen = () => {
    const statusEl = document.getElementById('talk-status');
    if (statusEl) statusEl.innerText = "LIVE (SPEAK NOW)";
    
    if (typeof sendInitialSetup === 'function') sendInitialSetup();
    if (typeof initMicrophone === 'function') initMicrophone();
  };

  ws.onmessage = async (event) => {
    if (typeof playResponseAudio === 'function') {
      try {
        const response = JSON.parse(await event.data.text());
        if (response.serverContent?.modelTurn?.parts?.[0]?.inlineData) {
          const base64Audio = response.serverContent.modelTurn.parts[0].inlineData.data;
          playResponseAudio(base64Audio);
        }
      } catch (err) {
        console.error("Audio play error:", err);
      }
    }
  };

  ws.onerror = (error) => {
    console.error("WebSocket Error:", error);
    const statusEl = document.getElementById('talk-status');
    if (statusEl) statusEl.innerText = "ERROR";
  };

  ws.onclose = () => {
    const statusEl = document.getElementById('talk-status');
    if (statusEl) statusEl.innerText = "CLOSED";
  };
}
async function initMicrophone() {
  audioCtx = new AudioContext({ sampleRate: 16000 });
  const blob = new Blob([processorCode], { type: 'application/javascript' });
  const workletUrl = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(workletUrl);

  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioCtx.createMediaStreamSource(micStream);
  processor = new AudioWorkletNode(audioCtx, 'pcm-processor');

  processor.port.onmessage = (e) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      const base64Data = btoa(String.fromCharCode(...new Uint8Array(e.data)));
      ws.send(JSON.stringify({
        realtime_input: { media_chunks: [{ data: base64Data, mime_type: "audio/pcm" }] }
      }));
    }
  };

  source.connect(processor);
}

// 簡易的な音声再生用（実際にはキュー管理が必要ですが、まずは鳴らすことを優先）
async function playResponseAudio(base64) {
  const arrayBuffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.start();
}
        function tab(mode) {
            const sections = ['battle', 'chat', 'talk'];
            sections.forEach(s => {
                const el = document.getElementById(s);
                if (el) el.style.display = (s === mode) ? 'block' : 'none';
            });
            // ボタンのスタイル更新
            const btns = document.querySelectorAll('button[onclick^="tab"]');
            btns.forEach(btn => {
                if (btn.getAttribute('onclick').includes(mode)) {
                    btn.classList.add('bg-slate-800', 'shadow-inner', 'text-white');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-slate-800', 'shadow-inner', 'text-white');
                    btn.classList.add('text-slate-500');
                }
            });
        }

        async function load() {
            try {
                // doPostを呼び出し
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getInitialData" }) });
                const d = await res.json();
                
                // プレイヤー情報反映
                document.getElementById('ulv').innerText = d.user.level;
                document.getElementById('uscore').innerText = d.user.score;
                document.getElementById('uhp-b').style.width = ((d.user.hp / d.user.maxHp) * 100) + "%";
                
                // モンスター情報反映（HTML側のIDに合わせ修正）
                document.getElementById('m-name').innerText = d.boss.name + " が あらわれた！";
                document.getElementById('m-hp-bar').style.width = ((d.boss.hp / d.boss.maxHp) * 100) + "%";
                if (d.boss.image) document.getElementById('m-img').src = d.boss.image;

                // 問題反映
                document.getElementById('q-cat').innerText = "【" + d.question.category + "】";
                document.getElementById('q-txt').innerText = d.question.text;
                
                window.qid = d.question.id;
                window.uMaxHp = d.user.maxHp;
                window.bMaxHp = d.boss.maxHp;

            } catch (e) {
                console.error("Load Error:", e);
            } finally {
                document.getElementById('ovl').classList.add('hidden');
            }
        }

        async function check() {
            const ans = document.getElementById('ans').value;
            if(!ans) return;
            document.getElementById('ovl').classList.remove('hidden');
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkAnswer", userAnswer: ans, questionId: window.qid }) });
                const r = await res.json();
                
                // HP更新
                document.getElementById('m-hp-bar').style.width = ((Number(r.bHp) / window.bMaxHp) * 100) + "%";
                document.getElementById('uhp-b').style.width = ((Number(r.uHp) / window.uMaxHp) * 100) + "%";
                
                alert(r.msg);
                document.getElementById('ans').value = "";
                load();
            } catch(e) { 
                alert("Error!"); 
                document.getElementById('ovl').classList.add('hidden'); 
            }
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const logs = document.getElementById('cbox');
            const text = input.value.trim();
            if (!text) return;

            logs.innerHTML += `<div class="text-right mt-2"><span class="bg-blue-600 p-2 rounded text-white inline-block">${text}</span></div>`;
            input.value = "";
            
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "askTutor", message: text }) });
                const d = await res.json();
                logs.innerHTML += `<div class="text-left mt-2"><span class="bg-slate-800 p-2 border border-white/20 inline-block">${d.answer}</span></div>`;
                logs.scrollTop = logs.scrollHeight;
            } catch (e) { console.error("Chat Error:", e); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            tab('battle');
        });
    </script>
</body>
</html>
