<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English RPG - Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .hp-fill { transition: width 0.5s ease; }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0%,100% {transform:translateX(0);} 25% {transform:translateX(-8px);} 75% {transform:translateX(8px);} }
        .active { display: block; }
        .tab-content { display: none; }
    </style>
</head>
<body class="min-h-screen pb-24">
    <header class="p-4 bg-slate-900 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <div class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold">LV.<span id="ulv">--</span></div>
            <div class="flex-1 bg-slate-800 h-3 rounded-full overflow-hidden">
                <div id="uhp-b" class="hp-fill bg-green-500 h-full" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="battle-view" class="tab-content active space-y-6">
            <div class="bg-slate-800/50 p-6 rounded-3xl border border-white/10 text-center">
                <div id="b-container"><img id="b-img" class="w-64 h-64 mx-auto rounded-2xl border-2 border-blue-500 shadow-2xl object-cover" src="" alt=""></div>
                <h2 id="b-name" class="text-2xl font-black mt-4 uppercase italic">---</h2>
                <div class="mt-4 bg-slate-900 h-3 rounded-full overflow-hidden">
                    <div id="bhp-b" class="hp-fill bg-red-600 h-full" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-white text-slate-900 p-8 rounded-3xl text-center shadow-2xl">
                <div id="qcat" class="text-[10px] font-bold text-blue-500 border border-blue-500 px-2 rounded inline-block mb-2">CATEGORY</div>
                <div id="qtext" class="text-2xl font-bold italic">Loading...</div>
            </div>

            <div class="flex gap-2">
                <input type="text" id="u-ans" placeholder="答えを入力..." class="flex-1 p-4 rounded-xl bg-slate-800 border border-white/10 outline-none text-xl">
                <button onclick="attack()" class="bg-blue-600 px-6 py-4 rounded-xl font-bold">ATTACK</button>
            </div>
        </div>

        <div id="chat-view" class="tab-content">
            <div class="bg-slate-800/50 p-4 rounded-3xl h-[65vh] flex flex-col border border-white/10">
                <div id="c-box" class="flex-1 overflow-y-auto space-y-4 p-2 text-sm"></div>
                <div class="mt-4 flex gap-2">
                    <button onclick="startVoice()" id="mic" class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center"><i class="fas fa-microphone"></i></button>
                    <input type="text" id="c-in" class="flex-1 bg-slate-700 p-3 rounded-full outline-none" placeholder="English only...">
                    <button onclick="sendChat()" class="text-blue-500 px-2"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 p-4 border-t border-white/10 flex justify-around">
        <button onclick="show('battle')" class="flex flex-col items-center text-blue-500"><i class="fas fa-sword text-xl"></i><span class="text-[10px]">BATTLE</span></button>
        <button onclick="show('chat')" class="flex flex-col items-center text-slate-400"><i class="fas fa-comment text-xl"></i><span class="text-[10px]">CHAT</span></button>
    </nav>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwPzX2zD55eQqQn2yUWDgz84CNRTY-_dXOYugB6jGAau6SvTuK8PBGfc12s8YLI9xcb-g/exec";

        async function load() {
            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getInitialData" }) });
                const d = await res.json();
                document.getElementById('ulv').innerText = d.user.level;
                document.getElementById('uhp-b').style.width = (d.user.hp/d.user.maxHp*100) + "%";
                document.getElementById('b-name').innerText = d.boss.name;
                document.getElementById('b-img').src = d.boss.image;
                document.getElementById('bhp-b').style.width = (d.boss.hp/d.boss.maxHp*100) + "%";
                document.getElementById('qtext').innerText = d.question.text;
                document.getElementById('qcat').innerText = d.question.category;
                window.qid = d.question.id;
            } catch(e) { alert("通信エラー: " + e); }
        }

        async function attack() {
            const a = document.getElementById('u-ans').value;
            if(!a) return;
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "checkAnswer", userAnswer: a, questionId: window.qid }) });
            const r = await res.json();
            if(r.isCorrect) {
                document.getElementById('b-container').classList.add('shake');
                setTimeout(()=>document.getElementById('b-container').classList.remove('shake'), 500);
            }
            alert(r.msg);
            document.getElementById('u-ans').value = "";
            load();
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-US';
            rec.start();
            rec.onresult = (e) => { document.getElementById('c-in').value = e.results[0][0].transcript; sendChat(); };
        }

        async function sendChat() {
            const i = document.getElementById('c-in');
            const msg = i.value; if(!msg) return;
            const box = document.getElementById('c-box');
            box.innerHTML += `<div class="text-right"><span class="bg-blue-600 p-2 rounded-lg inline-block">${msg}</span></div>`;
            i.value = "Thinking...";
            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "chatWithAI", userMessage: msg }) });
            const r = await res.json();
            i.value = "";
            box.innerHTML += `<div class="text-left"><span class="bg-slate-700 p-2 rounded-lg inline-block">${r}</span></div>`;
            box.scrollTop = box.scrollHeight;
            const s = new SpeechSynthesisUtterance(r.split('【')[0]);
            s.lang = 'en-US'; speechSynthesis.speak(s);
        }

        function show(v) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.getElementById(v + '-view').classList.add('active');
        }

        window.onload = load;
    </script>
</body>
</html>
